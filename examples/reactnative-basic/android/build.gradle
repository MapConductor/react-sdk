// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    mavenLocal()
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// com.mapconductor:for-googlemaps requires minSdk 26; this Expo app's generated default is 24.
// (Pre-existing gap unrelated to reactnative-for-here - reactnative-for-googlemaps ships an Expo
// config plugin that's supposed to raise this but isn't wired into this app's app.config.ts.)
ext.minSdkVersion = 26
